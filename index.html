<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Trigonometry Explorer – Unlimited Rotation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');
        :root {
            --bg-color: #000000;
            --canvas-bg-color: #1a1a1a;
            --controls-bg-color: #1f1f1f;
            --text-color: #f0f0f0;
            --axis-color: #ffffff;
            --grid-color: #444444;
            --circle-color: #ffffff;
            --radius-color: #ffffff;
            --cos-color: #ff0000;
            --sin-color: #00ff00;
            --tan-color: #ffff00;
            --sec-color: #9932cc;
            --cot-color: #ffa500;
            --csc-color: #4db8ff;
            --point-color: #4da6ff;
            --angle-color: #ffffff;
            --checkbox-color: #00bfff;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow-y: auto;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        #trigCanvas {
            background-color: var(--canvas-bg-color);
            border: 1px solid var(--grid-color);
            cursor: grab;
            width: 95%;
            max-width: 700px;
            height: auto;
            aspect-ratio: 1 / 1;
        }

        .controls {
            display: flex;
            flex-direction: column;
            width: 95%;
            max-width: 500px;
            padding: 20px;
            background-color: var(--controls-bg-color);
            border-radius: 8px;
            border: 1px solid #444;
            box-sizing: border-box;
        }
        .controls h2 { margin-top: 0; text-align: center; color: var(--tan-color); }
        
        .slider-container, .reset-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }
        .slider-container label { font-size: 1.1em; padding: 8px; }
        #resetButton {
            width: 100%;
            padding: 8px 15px;
            font-size: 1em;
            font-weight: bold;
            color: var(--text-color);
            background-color: #333;
            border: 1px solid #555;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #resetButton:hover { background-color: #555; }
        
        fieldset {
            border: 1px solid #444;
            border-radius: 5px;
            padding: 10px 15px;
            margin-top: 20px;
        }
        legend { padding: 0 10px; font-weight: bold; color: var(--text-color); }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 0.9em;
        }
        .checkbox-item input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            background-color: #333;
            border: 1px solid #777;
            width: 16px;
            height: 16px;
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            margin-right: 8px;
        }
        .checkbox-item input[type="checkbox"]:checked {
            background-color: var(--checkbox-color);
            border-color: var(--checkbox-color);
        }
        .checkbox-item input[type="checkbox"]:checked::after {
            content: '✔';
            font-size: 12px;
            font-weight: bold;
            color: white;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        td {
            padding: 8px;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        td:nth-child(2) {
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-align: right;
        }
        .color-swatch {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 8px;
            vertical-align: middle;
            border: 1px solid #555;
        }

        @media (min-width: 1024px) {
            body { justify-content: center; overflow: hidden; }
            .container { flex-direction: row; align-items: flex-start; padding: 20px; }
            .controls { width: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="trigCanvas"></canvas>
        <div class="controls">
            <h2>Trigonometry Explorer</h2>

            <div class="slider-container">
                <label>Angle θ: <span id="angleValue">40.0°</span></label>
            </div>
            <div class="reset-container">
                <button id="resetButton">Reset angle</button>
            </div>
            
            <fieldset>
                <legend>Display Ratios</legend>
                <div class="checkbox-grid">
                    <div class="checkbox-item"><input type="checkbox" class="ratio-checkbox" id="showSin" checked><span class="color-swatch" style="background-color: var(--sin-color);"></span><label for="showSin">sin(θ)</label></div>
                    <div class="checkbox-item"><input type="checkbox" class="ratio-checkbox" id="showCsc" checked><span class="color-swatch" style="background-color: var(--csc-color);"></span><label for="showCsc">csc(θ)</label></div>
                    <div class="checkbox-item"><input type="checkbox" class="ratio-checkbox" id="showCos" checked><span class="color-swatch" style="background-color: var(--cos-color);"></span><label for="showCos">cos(θ)</label></div>
                    <div class="checkbox-item"><input type="checkbox" class="ratio-checkbox" id="showSec" checked><span class="color-swatch" style="background-color: var(--sec-color);"></span><label for="showSec">sec(θ)</label></div>
                    <div class="checkbox-item"><input type="checkbox" class="ratio-checkbox" id="showTan" checked><span class="color-swatch" style="background-color: var(--tan-color);"></span><label for="showTan">tan(θ)</label></div>
                    <div class="checkbox-item"><input type="checkbox" class="ratio-checkbox" id="showCot" checked><span class="color-swatch" style="background-color: var(--cot-color);"></span><label for="showCot">cot(θ)</label></div>
                </div>
            </fieldset>

            <table>
                <tbody>
                    <tr><td>θ (degrees)</td><td id="angle-deg">40.0</td></tr>
                    <tr><td>θ (radians)</td><td id="angle-rad">0.6981</td></tr>
                    <tr><td colspan="2"><hr style="border-color: #444; margin: 0;"></td></tr>
                    <tr><td><span class="color-swatch" style="background-color: var(--cos-color);"></span>cos(θ)</td><td id="val-cos">0.7660</td></tr>
                    <tr><td><span class="color-swatch" style="background-color: var(--sin-color);"></span>sin(θ)</td><td id="val-sin">0.6428</td></tr>
                    <tr><td><span class="color-swatch" style="background-color: var(--tan-color);"></span>tan(θ)</td><td id="val-tan">0.8391</td></tr>
                    <tr><td><span class="color-swatch" style="background-color: var(--sec-color);"></span>sec(θ)</td><td id="val-sec">1.3054</td></tr>
                    <tr><td><span class="color-swatch" style="background-color: var(--cot-color);"></span>cot(θ)</td><td id="val-cot">1.1918</td></tr>
                    <tr><td><span class="color-swatch" style="background-color: var(--csc-color);"></span>csc(θ)</td><td id="val-csc">1.5557</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('trigCanvas');
            const ctx = canvas.getContext('2d');
            const DEFAULT_ANGLE = 40;
            let angleDeg = DEFAULT_ANGLE;  // can now be any real number (e.g., 400, -100)
            let isDragging = false;
            let lastMouseAngleRad = 0;

            const ui = {
                angleValueSpan: document.getElementById('angleValue'),
                angleDegTd: document.getElementById('angle-deg'),
                angleRadTd: document.getElementById('angle-rad'),
                resetButton: document.getElementById('resetButton'),
                checkboxes: {
                    cos: document.getElementById('showCos'),
                    sin: document.getElementById('showSin'),
                    tan: document.getElementById('showTan'),
                    sec: document.getElementById('showSec'),
                    cot: document.getElementById('showCot'),
                    csc: document.getElementById('showCsc'),
                },
                valTds: {
                    cos: document.getElementById('val-cos'),
                    sin: document.getElementById('val-sin'),
                    tan: document.getElementById('val-tan'),
                    sec: document.getElementById('val-sec'),
                    cot: document.getElementById('val-cot'),
                    csc: document.getElementById('val-csc'),
                }
            };

            let W, H, originX, originY, unitRadius;
            const style = getComputedStyle(document.documentElement);

            // ---------- HELPER DRAWING FUNCTIONS ----------
            const drawArrow = (x, y, dx, dy) => {
                const headlen = 10;
                const angle = Math.atan2(dy, dx);
                ctx.moveTo(x, y);
                ctx.lineTo(x - headlen * Math.cos(angle - Math.PI / 6), y - headlen * Math.sin(angle - Math.PI / 6));
                ctx.moveTo(x, y);
                ctx.lineTo(x - headlen * Math.cos(angle + Math.PI / 6), y - headlen * Math.sin(angle + Math.PI / 6));
            };

            const drawAxesAndGrid = () => {
                ctx.strokeStyle = style.getPropertyValue('--grid-color');
                ctx.lineWidth = 0.5;
                for (let i = -5; i <= 5; i++) {
                    if (i === 0) continue;
                    const x = originX + i * (unitRadius / 2);
                    const y = originY + i * (unitRadius / 2);
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
                }
                ctx.strokeStyle = style.getPropertyValue('--axis-color');
                ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(0, originY); ctx.lineTo(W, originY); ctx.stroke();
                drawArrow(W, originY, 1, 0);
                drawArrow(0, originY, -1, 0);
                ctx.beginPath(); ctx.moveTo(originX, 0); ctx.lineTo(originX, H); ctx.stroke();
                drawArrow(originX, 0, 0, -1);
                drawArrow(originX, H, 0, 1);
            };

            // Unified drawing of all six ratios based on checkboxes
            function drawAllRatios(angleRad, values) {
                const { cos, sin, tan, sec, cot, csc } = values;
                const pX = originX + cos * unitRadius;
                const pY = originY - sin * unitRadius;

                const canDraw = (val) => isFinite(val) && Math.abs(val * unitRadius) < Math.max(W, H) * 2;

                // 1. Cosine (horizontal leg)
                if (ui.checkboxes.cos.checked && isFinite(cos)) {
                    ctx.strokeStyle = style.getPropertyValue('--cos-color');
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(originX, originY);
                    ctx.lineTo(pX, originY);
                    ctx.stroke();
                    ctx.fillStyle = ctx.strokeStyle;
                    ctx.font = "bold 20px Arial";
                    ctx.fillText("cos", originX + (pX - originX) / 2, originY + 25);
                }

                // 2. Sine (vertical leg)
                if (ui.checkboxes.sin.checked && isFinite(sin)) {
                    ctx.strokeStyle = style.getPropertyValue('--sin-color');
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(pX, originY);
                    ctx.lineTo(pX, pY);
                    ctx.stroke();
                    ctx.fillStyle = ctx.strokeStyle;
                    ctx.save();
                    ctx.translate(pX + 15, originY + (pY - originY) / 2);
                    ctx.fillText("sin", 0, 5);
                    ctx.restore();
                }

                // 3. Tangent (vertical tangent line segment at x = ±R)
                if (ui.checkboxes.tan.checked && canDraw(tan)) {
                    const tanDir = (cos >= 0) ? 1 : -1;
                    const tanLineX = originX + tanDir * unitRadius;
                    const intersectY = originY - tan * tanDir * unitRadius;
                    ctx.strokeStyle = style.getPropertyValue('--tan-color');
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(tanLineX, originY);
                    ctx.lineTo(tanLineX, intersectY);
                    ctx.stroke();
                    ctx.fillStyle = ctx.strokeStyle;
                    ctx.save();
                    ctx.translate(tanLineX + 20 * tanDir, originY + (intersectY - originY) / 2);
                    ctx.fillText("tan", 0, 5);
                    ctx.restore();
                }

                // 4. Secant (line from origin to intersection on tangent line)
                if (ui.checkboxes.sec.checked && canDraw(sec)) {
                    const secDir = (cos >= 0) ? 1 : -1;
                    const secLineX = originX + secDir * unitRadius;
                    const intersectY = originY - tan * secDir * unitRadius;
                    ctx.strokeStyle = style.getPropertyValue('--sec-color');
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(originX, originY);
                    ctx.lineTo(secLineX, intersectY);
                    ctx.stroke();
                    ctx.fillStyle = ctx.strokeStyle;
                    ctx.save();
                    ctx.translate(originX + (secLineX - originX) / 2, originY + (intersectY - originY) / 2);
                    ctx.rotate(-angleRad);
                    ctx.fillText("sec", 15 * secDir, -10);
                    ctx.restore();
                }

                // 5. Cotangent (horizontal tangent line segment at y = ±R)
                if (ui.checkboxes.cot.checked && canDraw(cot)) {
                    const cotDir = (sin >= 0) ? 1 : -1;
                    const cotLineY = originY - cotDir * unitRadius;
                    const intersectX = originX + cot * cotDir * unitRadius;
                    ctx.strokeStyle = style.getPropertyValue('--cot-color');
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(originX, cotLineY);
                    ctx.lineTo(intersectX, cotLineY);
                    ctx.stroke();
                    ctx.fillStyle = ctx.strokeStyle;
                    ctx.fillText("cot", originX + (intersectX - originX) / 2, cotLineY - 15);
                }

                // 6. Cosecant (line from origin to intersection on horizontal tangent)
                if (ui.checkboxes.csc.checked && canDraw(csc)) {
                    const cscDir = (sin >= 0) ? 1 : -1;
                    const cscLineY = originY - cscDir * unitRadius;
                    const intersectX = originX + cot * cscDir * unitRadius;
                    ctx.strokeStyle = style.getPropertyValue('--csc-color');
                    ctx.lineWidth = 5;
                    ctx.beginPath();
                    ctx.moveTo(originX, originY);
                    ctx.lineTo(intersectX, cscLineY);
                    ctx.stroke();
                    ctx.fillStyle = ctx.strokeStyle;
                    ctx.save();
                    ctx.translate(originX + (intersectX - originX) / 2, originY + (cscLineY - originY) / 2);
                    ctx.rotate(-angleRad);
                    ctx.fillText("csc", 20, -10);
                    ctx.restore();
                }
            }

            // ---------- MAIN DRAW FUNCTION ----------
            function drawSimulation(currentAngleDeg) {
                if (!W) return;
                // Compute trigonometric values using the actual angle (periodic functions handle large values)
                const angleRad = currentAngleDeg * Math.PI / 180;
                const epsilon = 1e-10;
                const values = {
                    sin: Math.sin(angleRad),
                    cos: Math.cos(angleRad),
                    tan: (Math.abs(Math.cos(angleRad)) < epsilon) ? Infinity : Math.tan(angleRad),
                    sec: (Math.abs(Math.cos(angleRad)) < epsilon) ? Infinity : 1 / Math.cos(angleRad),
                    cot: (Math.abs(Math.sin(angleRad)) < epsilon) ? Infinity : 1 / Math.tan(angleRad),
                    csc: (Math.abs(Math.sin(angleRad)) < epsilon) ? Infinity : 1 / Math.sin(angleRad),
                };

                ctx.clearRect(0, 0, W, H);
                drawAxesAndGrid();

                const pX = originX + values.cos * unitRadius;
                const pY = originY - values.sin * unitRadius;

                // Unit circle
                ctx.strokeStyle = style.getPropertyValue('--circle-color');
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(originX, originY, unitRadius, 0, 2 * Math.PI);
                ctx.stroke();

                // Dashed lines at ±R
                ctx.strokeStyle = style.getPropertyValue('--axis-color');
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 4]);
                ctx.beginPath(); ctx.moveTo(originX + unitRadius, 0); ctx.lineTo(originX + unitRadius, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(originX - unitRadius, 0); ctx.lineTo(originX - unitRadius, H); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, originY - unitRadius); ctx.lineTo(W, originY - unitRadius); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, originY + unitRadius); ctx.lineTo(W, originY + unitRadius); ctx.stroke();
                ctx.setLineDash([]);

                // Permanent radius line (center to point)
                ctx.strokeStyle = style.getPropertyValue('--radius-color');
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(originX, originY);
                ctx.lineTo(pX, pY);
                ctx.stroke();

                // Draw trig ratio segments (they overlay the radius line)
                drawAllRatios(angleRad, values);

                // --- Angle arc and label (using principal angle modulo 360 for clean visual) ---
                const principalAngleDeg = ((currentAngleDeg % 360) + 360) % 360;
                const principalAngleRad = principalAngleDeg * Math.PI / 180;
                ctx.strokeStyle = style.getPropertyValue('--angle-color');
                ctx.lineWidth = 2;
                ctx.beginPath();
                // Draw arc from 0 to principalAngleRad (positive direction)
                ctx.arc(originX, originY, 40, 0, -principalAngleRad, principalAngleRad > 0);
                ctx.stroke();
                ctx.fillStyle = style.getPropertyValue('--angle-color');
                ctx.font = "18px Arial";
                const labelAngle = -principalAngleRad / 2;
                ctx.fillText("θ", originX + 55 * Math.cos(labelAngle), originY + 55 * Math.sin(labelAngle));

                // Point on circle
                ctx.fillStyle = style.getPropertyValue('--point-color');
                ctx.beginPath();
                ctx.arc(pX, pY, 10, 0, 2 * Math.PI);
                ctx.fill();

                // Update UI values (show actual angle, not modulo)
                ui.angleValueSpan.textContent = `${currentAngleDeg.toFixed(1)}°`;
                ui.angleDegTd.textContent = currentAngleDeg.toFixed(1);
                ui.angleRadTd.textContent = angleRad.toFixed(4);
                for (let key of ['cos', 'sin', 'tan', 'sec', 'cot', 'csc']) {
                    const val = values[key];
                    if (ui.valTds[key]) ui.valTds[key].textContent = isFinite(val) ? val.toFixed(4) : "undef.";
                }
            }

            function setupAndResizeCanvas() {
                const size = canvas.getBoundingClientRect().width;
                canvas.width = size;
                canvas.height = size;
                W = canvas.width;
                H = canvas.height;
                originX = W / 2;
                originY = H / 2;
                unitRadius = W / 3.5;
                drawSimulation(angleDeg);
            }

            // ---------- EVENT HANDLERS (Continuous Rotation) ----------
            function getMouseAngleRad(canvasEl, evt) {
                const rect = canvasEl.getBoundingClientRect();
                const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
                const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
                const x = clientX - rect.left - originX;
                const y = -(clientY - rect.top - originY);
                return Math.atan2(y, x);
            }

            const onDragStart = (e) => {
                e.preventDefault();
                const mouseAngle = getMouseAngleRad(canvas, e);
                lastMouseAngleRad = mouseAngle;
                isDragging = true;
                canvas.style.cursor = 'grabbing';
            };

            const onDragMove = (e) => {
                if (!isDragging) return;
                e.preventDefault();
                const currentMouseAngle = getMouseAngleRad(canvas, e);
                let delta = currentMouseAngle - lastMouseAngleRad;
                // Normalize delta to the shortest angular distance (avoid large jumps)
                if (delta > Math.PI) delta -= 2 * Math.PI;
                if (delta < -Math.PI) delta += 2 * Math.PI;
                const deltaDeg = delta * 180 / Math.PI;
                angleDeg += deltaDeg;
                lastMouseAngleRad = currentMouseAngle;
                drawSimulation(angleDeg);
            };

            const onDragEnd = () => {
                isDragging = false;
                canvas.style.cursor = 'grab';
            };

            canvas.addEventListener('mousedown', onDragStart);
            canvas.addEventListener('mousemove', onDragMove);
            canvas.addEventListener('mouseup', onDragEnd);
            canvas.addEventListener('mouseleave', onDragEnd);
            canvas.addEventListener('touchstart', onDragStart, { passive: false });
            canvas.addEventListener('touchmove', onDragMove, { passive: false });
            canvas.addEventListener('touchend', onDragEnd);

            ui.resetButton.addEventListener('click', () => {
                angleDeg = DEFAULT_ANGLE;
                drawSimulation(angleDeg);
            });

            Object.values(ui.checkboxes).forEach(cb => cb.addEventListener('change', () => drawSimulation(angleDeg)));

            // Initial setup
            window.addEventListener('resize', setupAndResizeCanvas);
            setupAndResizeCanvas();
        });
    </script>
</body>
</html>
